<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entertainment For You ❤️</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Musik -->
<audio id="bgMusic" loop>
    <source src="assets/music/song.mp3" type="audio/mpeg">
</audio>

<!-- Tombol Musik -->
<button id="musicBtn" class="music-btn">🎵</button>

<!-- Hero -->
<header class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

        <h1 id="heroTitle">Entertainment For You ❤️</h1>

        <p id="heroSubtitle">
            Ada sesuatu yang ingin aku sampaikan...
        </p>

        <button id="openLetter">
            💌 Buka Surat
        </button>

    </div>

</header>

<!-- Surat -->
<section id="letter" class="section">

    <h2>💌 Surat Untuk Kamu</h2>

    <p id="typingText"></p>

</section>

<!-- Galeri -->
<section class="section">

    <h2>📸 Kenangan Kita</h2>

    <div id="gallery" class="gallery">

    </div>

</section>

<!-- Alasan -->
<section class="section">

    <h2>❤️ Kenapa Aku Suka Kamu</h2>

    <ul id="reasonList">

    </ul>

</section>

<!-- Quotes -->
<section class="section">

    <h2>✨ Quotes</h2>

    <blockquote id="quote">

    </blockquote>

</section>

<!-- Footer -->
<footer>

    <h2 id="endingTitle">

        Terima Kasih ❤️

    </h2>

    <p id="endingText">

        Semoga kamu suka dengan semua ini.

    </p>

</footer>

<!-- Template Foto -->
<template id="photoTemplate">

    <div class="card">

        <img>

        <div class="caption"></div>

    </div>

</template>

<script src="script.js"></script>

</
